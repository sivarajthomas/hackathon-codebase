# BigQuery MCP server configuration for the MCP Toolbox for Databases.
#
# This file reproduces the full set of Google's PREBUILT BigQuery tools
# (equivalent to `toolbox --prebuilt bigquery`) and adds a few CUSTOM tools
# on top. Because prebuilt toolsets cannot be extended, we run the Toolbox
# binary against this file instead:
#
#   toolbox --tools-file ./bigquery-mcp/tools.yaml --stdio
#
# All values are driven by environment variables (BIGQUERY_PROJECT, etc.); nothing
# is hardcoded.

# --------------------------------------------------------------------------
# Source: a single BigQuery connection shared by every tool below.
# --------------------------------------------------------------------------
sources:
  bigquery-source:
    kind: bigquery
    project: ${BIGQUERY_PROJECT}
    location: ${BIGQUERY_LOCATION:}
    useClientOAuth: ${BIGQUERY_USE_CLIENT_OAUTH:false}
    scopes: ${BIGQUERY_SCOPES:}
    maxQueryResultRows: ${BIGQUERY_MAX_QUERY_RESULT_ROWS:50}
    impersonateServiceAccount: ${BIGQUERY_IMPERSONATE_SERVICE_ACCOUNT:}
    maximumBytesBilled: ${BIGQUERY_MAXIMUM_BYTES_BILLED:0}

tools:
  # ------------------------------------------------------------------------
  # PREBUILT tools (identical to Google's `--prebuilt bigquery`).
  # ------------------------------------------------------------------------
  execute_sql:
    kind: bigquery-execute-sql
    source: bigquery-source
    description: Use this tool to execute a SQL statement.

  list_dataset_ids:
    kind: bigquery-list-dataset-ids
    source: bigquery-source
    description: Use this tool to list datasets.

  list_table_ids:
    kind: bigquery-list-table-ids
    source: bigquery-source
    description: Use this tool to list tables.

  get_dataset_info:
    kind: bigquery-get-dataset-info
    source: bigquery-source
    description: Use this tool to get dataset metadata.

  get_table_info:
    kind: bigquery-get-table-info
    source: bigquery-source
    description: Use this tool to get table metadata.

  search_catalog:
    kind: bigquery-search-catalog
    source: bigquery-source
    description: Use this tool to find tables, views, models, routines or connections.

  analyze_contribution:
    kind: bigquery-analyze-contribution
    source: bigquery-source
    description: Use this tool to analyze the contribution about changes to key metrics in multi-dimensional data.

  ask_data_insights:
    kind: bigquery-conversational-analytics
    source: bigquery-source
    description: |
      Use this tool to perform data analysis, get insights,
      or answer complex questions about the contents of specific
      BigQuery tables.

  forecast:
    kind: bigquery-forecast
    source: bigquery-source
    description: Use this tool to forecast time series data.

  # ------------------------------------------------------------------------
  # CUSTOM tools (added on top of the prebuilt set).
  # Identifiers (dataset/table) use templateParameters; user data uses
  # bound query parameters (@name) to keep queries injection-safe.
  # ------------------------------------------------------------------------
  preview_table:
    kind: bigquery-sql
    source: bigquery-source
    description: Return a small preview of rows from a table for quick inspection.
    parameters:
      - name: max_rows
        type: integer
        description: Maximum number of rows to return (1-1000).
        default: 20
    templateParameters:
      - name: dataset
        type: string
        description: The dataset id that contains the table.
      - name: table
        type: string
        description: The table id to preview.
    statement: |
      SELECT * FROM `{{.dataset}}.{{.table}}` LIMIT @max_rows

  count_rows:
    kind: bigquery-sql
    source: bigquery-source
    description: Return the total number of rows in a table.
    templateParameters:
      - name: dataset
        type: string
        description: The dataset id that contains the table.
      - name: table
        type: string
        description: The table id to count rows for.
    statement: |
      SELECT COUNT(*) AS row_count FROM `{{.dataset}}.{{.table}}`

  table_storage_info:
    kind: bigquery-sql
    source: bigquery-source
    description: Return storage statistics (row count, logical and physical bytes) for the tables in a dataset.
    templateParameters:
      - name: dataset
        type: string
        description: The dataset id to inspect.
    statement: |
      SELECT
        table_name,
        total_rows,
        total_logical_bytes,
        total_physical_bytes
      FROM `{{.dataset}}.INFORMATION_SCHEMA.TABLE_STORAGE`
      ORDER BY total_logical_bytes DESC

# --------------------------------------------------------------------------
# Toolsets: named groups the MCP client can expose. Toolbox also auto-creates
# a `default` toolset containing every tool, so we don't define one here.
# --------------------------------------------------------------------------
toolsets:
  data:
    - execute_sql
    - list_dataset_ids
    - list_table_ids
    - get_dataset_info
    - get_table_info
    - search_catalog
  analytics:
    - analyze_contribution
    - ask_data_insights
    - forecast
    - search_catalog
  custom:
    - preview_table
    - count_rows
    - table_storage_info

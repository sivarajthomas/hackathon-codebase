# Cloud Build pipeline for the MCP Chat Frontend.
#
# Builds the image (context = frontend/, self-contained), pushes it to Artifact
# Registry, and deploys it to Cloud Run. The frontend is the user-facing entry
# point, so it deploys with --allow-unauthenticated by default. Its runtime
# service account still needs roles/run.invoker on the orchestrator so it can
# mint a valid identity token.
#
# Manual run (from the repository root):
#   gcloud builds submit ./frontend --config frontend/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=mcp-servers,\
# _ORCHESTRATOR_URL=https://orchestrator-xxxx.run.app

substitutions:
  _REGION: us-central1
  _REPO: mcp-servers
  _SERVICE: mcp-frontend
  _ORCHESTRATOR_URL: ""

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --allow-unauthenticated
      - --set-env-vars=ORCHESTRATOR_URL=${_ORCHESTRATOR_URL},USE_AUTH=true

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

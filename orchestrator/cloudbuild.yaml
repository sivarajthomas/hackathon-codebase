# Cloud Build pipeline for the MCP Orchestrator backend.
#
# Builds the image (context = repo root so the Dockerfile can COPY ./shared and
# ./orchestrator), pushes it to Artifact Registry, and deploys it to Cloud Run.
#
# GitHub trigger: set the build config path to "orchestrator/cloudbuild.yaml".
# Manual run (from the repository root), supplying the MCP service URLs:
#   gcloud builds submit . --config orchestrator/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=mcp-servers,\
# _INVOICE_URL=https://invoice-mcp-xxxx.run.app/mcp,\
# _BIGQUERY_URL=https://bigquery-mcp-xxxx.run.app/mcp

substitutions:
  _REGION: us-central1
  _REPO: mcp-servers
  _SERVICE: orchestrator
  _VERTEX_LOCATION: us-central1
  _INVOICE_URL: ""
  _BIGQUERY_URL: ""
  _ROUTER_MODEL: gemini-2.5-flash
  _MODEL_SIMPLE: gemini-2.5-flash-lite
  _MODEL_MODERATE: gemini-2.5-flash
  _MODEL_COMPLEX: gemini-2.5-pro

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - orchestrator/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --no-allow-unauthenticated
      - --set-env-vars=APP_ENV=production,GCP_PROJECT=$PROJECT_ID,VERTEX_LOCATION=${_VERTEX_LOCATION},INVOICE_MCP_URL=${_INVOICE_URL},BIGQUERY_MCP_URL=${_BIGQUERY_URL},ROUTER_MODEL=${_ROUTER_MODEL},MODEL_SIMPLE=${_MODEL_SIMPLE},MODEL_MODERATE=${_MODEL_MODERATE},MODEL_COMPLEX=${_MODEL_COMPLEX},MCP_USE_AUTH=true

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

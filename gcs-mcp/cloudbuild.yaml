# Cloud Build pipeline for the Invoice/Shipment MCP server.
#
# Builds the image (context = repo root, so the Dockerfile can COPY ./shared and
# ./invoice-mcp), pushes it to Artifact Registry, and deploys it to Cloud Run.
#
# GitHub trigger: set the build config path to "invoice-mcp/cloudbuild.yaml".
# Manual run (from the repository root):
#   gcloud builds submit . --config invoice-mcp/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_REPO=mcp-servers,_GCS_BUCKET=gcp-eds-finance-user-dev_isps_test_config_s

substitutions:
  _REGION: us-central1
  _REPO: mcp-servers
  _SERVICE: gcs-mcp
  _GCS_BUCKET: invoice-policy-knowledge-documents

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - gcs-mcp/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --no-allow-unauthenticated
      - --set-env-vars=APP_ENV=production,GCP_PROJECT=$PROJECT_ID,GCS_BUCKET=${_GCS_BUCKET}
      - --service-account=cloud-run-sa@project-00c7b34c-acc0-4431-afb.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s

# Build + deploy the Invoice-Intake backend to Cloud Run.
#
# Run from the repository root (hackathon-codebase/):
#   gcloud builds submit . --config invoice-intake/backend/cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=invoice-intake-backend
#
# Set runtime config after deploy (or here via --set-env-vars):
#   GCP_PROJECT_ID, BIGQUERY_DATASET, PUBSUB_TOPIC
substitutions:
  _REGION: us-central1
  _SERVICE: invoice-intake-backend
  _REPO: mcp-servers

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - invoice-intake/backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - invoice-intake/backend
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --service-account=cloud-run-sa@project-00c7b34c-acc0-4431-afb.iam.gserviceaccount.com

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
options:
  logging: CLOUD_LOGGING_ONLY
